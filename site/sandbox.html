<!doctype html>
<html lang="en-GB">
<head>

  <meta name="color-scheme" content="light dark">

  <script>
    (function () {
      try {
        var storedTheme = localStorage.getItem('steadyplan-site-theme');
        if (storedTheme === 'dark' || storedTheme === 'light') {
          document.documentElement.dataset.theme = storedTheme;
        }
      } catch (error) {}
    })();

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            earth: {
              cream: 'var(--bg)',
              light: 'var(--bg-soft)',

  <style>
    /* Force vertical scrollbar to prevent horizontal page shift when navigating */
    html {
      overflow-y: scroll;
    }
    
    /* Lock container width to match site.css exactly, overriding Tailwind's container utility */
    .container {
      max-width: var(--max) !important;
      width: 100% !important;
      margin: 0 auto !important;
      padding: 0 1.25rem !important;
    }

    /* Floating Showcase Demo Banner */
    .demo-banner {
      background: var(--text) !important;
      color: var(--bg) !important;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 0.45rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      z-index: 1001;
      position: sticky;
      top: 0;
      border-bottom: 1px solid var(--border);
    }
    .demo-banner-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .demo-banner-actions a {
      color: var(--accent) !important;
      text-transform: none;
      font-weight: 700;
      text-decoration: underline;
    }
    .demo-banner-actions a:hover {
      color: var(--accent-2) !important;
    }
    .demo-install-btn {
      background: var(--bg) !important;
      color: var(--text) !important;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      text-decoration: none !important;
      font-size: 0.6rem;
    }
    .demo-install-btn:hover {
      background: var(--border) !important;
      color: var(--text) !important;
    }
    
    /* App header bar matching self-hosted layout */
    .app-header {
      background: rgba(15, 23, 42, 0.96) !important;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 1.9rem; /* immediately below demo banner */
      z-index: 1000;
      backdrop-filter: blur(10px);
    }
    
    /* Navigation inside header */
    .app-header nav button {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.45rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.15s ease, background 0.15s ease;
    }
    .app-header nav button:hover {
      color: var(--text);
      background: rgba(255,255,255,0.05);
    }
    .app-header nav button.active {
      color: var(--accent) !important;
      background: rgba(56, 189, 248, 0.10) !important;
    }
    
    /* Bottom Navigation for mobile screens */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 62px;
      background: rgba(15, 23, 42, 0.98);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 1000;
      padding: 0 0.5rem;
      backdrop-filter: blur(10px);
    }
    @media (min-width: 768px) {
      .bottom-nav {
        display: none;
      }
    }
    @media (max-width: 767px) {
      .app-header nav {
        display: none; /* Hide top nav on mobile, use bottom nav */
      }
    }
    
    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.6rem;
      font-weight: 600;
      cursor: pointer;
      gap: 0.2rem;
    }
    .bottom-nav-item svg {
      width: 18px;
      height: 18px;
    }
    .bottom-nav-item.active {
      color: var(--accent) !important;
    }

    .month-active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 3px;
      background-color: var(--accent);
      border-radius: 9999px;
    }
    
    /* Fix potential Tailwind override issues on inputs in light/dark modes */
    input, select {
      background-color: var(--bg-soft) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    input:focus, select:focus {
      border-color: var(--accent) !important;
    }

    /* Global Hover Glow effect matching the self-hosted Flask (Docker) app */
    .sandbox-tile {
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .sandbox-tile:hover {
      transform: translateY(-2px);
      border-color: var(--accent) !important;
      box-shadow: 0 0 15px color-mix(in srgb, var(--accent) 22%, transparent) !important;
    }
  </style>

<body>

  <!-- Interactive Demo Mode Top Banner -->
  <div class="demo-banner">
    <div class="flex items-center space-x-2">
      <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
      <span>Showcase Mode (Sandbox)</span>
    </div>
    <div class="demo-banner-actions">
      <a href="./index.html">&larr; Back to Website</a>

  <!-- Diagnostic Error Overlay -->
  <script>
    window.addEventListener('error', function(e) {
      const app = document.getElementById('app');
      if (app) {
        app.innerHTML = `
          <div class="flex flex-col items-center justify-center min-h-[75vh] p-8 text-center text-red-500">
            <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            <h2 class="text-2xl font-bold mb-2">Diagnostic Error</h2>
            <p class="font-mono text-sm bg-red-100 text-red-900 p-4 rounded-xl text-left w-full max-w-2xl overflow-x-auto">
              Message: ${e.message}<br>
              File: ${e.filename}<br>
              Line: ${e.lineno}:${e.colno}
            </p>
          </div>
        `;
      }
    });
    window.addEventListener('unhandledrejection', function(e) {
      const app = document.getElementById('app');
      if (app) {
        app.innerHTML = `
          <div class="flex flex-col items-center justify-center min-h-[75vh] p-8 text-center text-red-500">
            <h2 class="text-2xl font-bold mb-2">Promise Rejection</h2>
            <p class="font-mono text-sm bg-red-100 text-red-900 p-4 rounded-xl text-left w-full max-w-2xl">${e.reason}</p>
          </div>
        `;
      }
    });
  </script>

  <!-- React mounting Node -->
  <div id="app">
    <!-- Premium Centered Loader -->
    <div class="flex flex-col items-center justify-center min-h-[75vh] space-y-8 animate-in fade-in duration-700">
      <div class="relative flex items-center justify-center w-24 h-24">
        <!-- Outer atmospheric rings -->
        <div class="absolute inset-0 rounded-full border-2 border-earth-sage opacity-20 animate-ping"></div>
        <div class="absolute inset-3 rounded-full border border-earth-sage opacity-40 animate-pulse"></div>
        
        <!-- Core rotating reactor -->
        <svg class="animate-spin text-earth-sage w-12 h-12 relative z-10" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
          <path class="opacity-90" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </div>
      
      <div class="text-center space-y-2">
        <h2 class="text-lg md:text-xl font-mono font-bold text-earth-charcoal tracking-widest uppercase">Building Showcase Environment</h2>
        <p class="text-sm font-sans text-earth-muted animate-pulse">Compiling local React modules and downloading vendor scripts...</p>
      </div>
    </div>
  </div>

  <!-- React Sandbox App -->
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    function App() {
      // Top Shell View tab selector: overview, performance, allowances, projections, budget, debts, settings
      const [appView, setAppView] = useState("overview");
      const [selectedMonth, setSelectedMonth] = useState("Jul");
      
      // Nested Budget Navigation State
      const [budgetTab, setBudgetTab] = useState('plan');

      // Financial Planning State Variables (Fictitious demo data)
      const [monthlyIncome, setIncome] = useState(() => Number(localStorage.getItem('sp_v2_income')) || 3500.00);

      // Derived States via useMemo to prevent side-effects and infinite rendering loops
      const fixedExpenses = useMemo(() => {
        const next = simulationInputs || {};
        return parseFloat(((next.rent || 0) + (next.mobile || 0) + (next.internet || 0) + (next.travel || 0) + (next.cloud || 0) + (next.subscriptions || 0) + (next.ai || 0)).toFixed(2));
      }, [simulationInputs]);

      const debtRepayment = useMemo(() => {
        const next = simulationInputs || {};
        return parseFloat((next.netwestCC || 0).toFixed(2));
      }, [simulationInputs]);

      const investmentsSavings = useMemo(() => {
        const next = simulationInputs || {};
        return parseFloat(((next.stocksMonthly || 0) + (next.lisaMonthly || 0) + (next.investEngineMonthly || 0) + (next.bondsMonthly || 0) + (next.t212Monthly || 0) + (next.cashParkMonthly || 0)).toFixed(2));
      }, [simulationInputs]);

      // Connected Financial Assumptions (Safely clamped against local storage corruption)
      const [currentAge, setCurrentAge] = useState(() => {
        const val = Number(localStorage.getItem('sp_v2_curr_age'));
        return (!isNaN(val) && val > 0 && val < 120) ? val : 32;
      });
      const [retirementAge, setRetirementAge] = useState(() => {
        const val = Number(localStorage.getItem('sp_v2_ret_age'));
        return (!isNaN(val) && val > 0 && val < 120) ? val : 60;
      });
      const [yearlyGrowth, setYearlyGrowth] = useState(() => {
        const val = Number(localStorage.getItem('sp_v2_growth'));
        return (!isNaN(val) && val >= -100 && val <= 100) ? val : 6.5;
      });

      // Fictitious Debt Planner State (Protected from massive array injection)
      const [debts, setDebts] = useState(() => {
        try {
          const cached = localStorage.getItem('sp_v2_debts');
          const parsed = cached ? JSON.parse(cached) : null;
          return Array.isArray(parsed) ? parsed.slice(0, 50) : [
            { id: 'd1', name: "Sainsbury's Credit Card", balance: 1450.00, rate: 18.9, payoffPayment: 70.00 },
            { id: 'd2', name: "Barclaycard Purchase", balance: 2200.00, rate: 0.0, payoffPayment: 80.00 }
          ];
        } catch {
          return [
            { id: 'd1', name: "Sainsbury's Credit Card", balance: 1450.00, rate: 18.9, payoffPayment: 70.00 },
            { id: 'd2', name: "Barclaycard Purchase", balance: 2200.00, rate: 0.0, payoffPayment: 80.00 }
          ];
        }
      });

      // Detailed Simulation Input Object (Protected from JSON parse errors)
      const [simulationInputs, setSimulationInputs] = useState(() => {
        const defaultInputs = {
          rent: 850.00,
          mobile: 15.00,
          internet: 35.00,
          travel: 120.00,
          cloud: 10.00,
          subscriptions: 20.00,
          ai: 25.00,
          netwestCC: 150.00,
          stocksMonthly: 400.00,
          lisaMonthly: 100.00,
          investEngineMonthly: 200.00,
          bondsMonthly: 100.00,
          t212Monthly: 300.00,
          cashParkMonthly: 0.00,
          goingOut: 250.00
        };
        try {
          const cached = localStorage.getItem('sp_v2_sim_inputs');
          return cached ? JSON.parse(cached) : defaultInputs;
        } catch {
          return defaultInputs;
        }
      });

      // Asset Accounts Model (Protected from massive array injection)
      const [accounts, setAccounts] = useState(() => {
        try {
          const cached = localStorage.getItem('sp_v2_accounts');
          const parsed = cached ? JSON.parse(cached) : null;
          return Array.isArray(parsed) ? parsed.slice(0, 50) : [
            { id: 'sip1', name: "SIPP Pension Fund", balance: 24500.00, type: 'Locked', code: 'Generic SIPP Provider' },
            { id: 'isa1', name: "Stocks & Shares ISA", balance: 12350.00, type: 'Accessible', code: 'Trading 212 ISA' },
            { id: 'pension1', name: "Workplace Pension", balance: 8450.00, type: 'Locked', code: 'Standard Life Workplace' },
            { id: 'isa2', name: "Emergency Savings Pot", balance: 5000.00, type: 'Accessible', code: 'High-Yield Savings' },
            { id: 'lisa1', name: "Lifetime ISA (LISA)", balance: 4200.00, type: 'Restricted', code: 'Dodl LISA' }
          ];
        } catch {
          return [
            { id: 'sip1', name: "SIPP Pension Fund", balance: 24500.00, type: 'Locked', code: 'Generic SIPP Provider' },
            { id: 'isa1', name: "Stocks & Shares ISA", balance: 12350.00, type: 'Accessible', code: 'Trading 212 ISA' },
            { id: 'pension1', name: "Workplace Pension", balance: 8450.00, type: 'Locked', code: 'Standard Life Workplace' },
            { id: 'isa2', name: "Emergency Savings Pot", balance: 5000.00, type: 'Accessible', code: 'High-Yield Savings' },
            { id: 'lisa1', name: "Lifetime ISA (LISA)", balance: 4200.00, type: 'Restricted', code: 'Dodl LISA' }
          ];
        }
      });

      // Temporary contribution plan overrides
      const [temporaryPlans, setTemporaryPlans] = useState(() => {
        try {
          const cached = localStorage.getItem('sp_v2_temp_plans');
          return cached ? JSON.parse(cached) : [
            { id: 'tp1', name: "Summer ISA front-loading", accountId: 'isa1', amount: 600, startMonth: '2026-06', endMonth: '2026-08' },
            { id: 'tp2', name: "LISA bonus fill", accountId: 'lisa1', amount: 500, startMonth: '2026-05', endMonth: '2026-07' }
          ];
        } catch {
          return [
            { id: 'tp1', name: "Summer ISA front-loading", accountId: 'isa1', amount: 600, startMonth: '2026-06', endMonth: '2026-08' },
            { id: 'tp2', name: "LISA bonus fill", accountId: 'lisa1', amount: 500, startMonth: '2026-05', endMonth: '2026-07' }
          ];
        }
      });

      // Monthly update simulation states
      const [monthlyUpdateComplete, setMonthlyUpdateComplete] = useState(() => {
        return localStorage.getItem('sp_v2_update_complete') === 'true';
      });
      const [monthlyUpdateConfirmed, setMonthlyUpdateConfirmed] = useState(() => {
        try {
          const cached = localStorage.getItem('sp_v2_update_confirmed');
          return cached ? JSON.parse(cached) : {};
        } catch {
          return {};
        }
      });
      const [monthlyUpdateNote, setMonthlyUpdateNote] = useState(() => {
        return localStorage.getItem('sp_v2_update_note') || "";
      });
      const [monthlyUpdateHistory, setMonthlyUpdateHistory] = useState(() => {
        try {
          const cached = localStorage.getItem('sp_v2_update_history');
          return cached ? JSON.parse(cached) : [
            { month: "June 2026", note: "Stock market up, Workplace pension value updated.", status: "complete" },
            { month: "May 2026", note: "Baseline snapshot created.", status: "complete" }
          ];
        } catch {
          return [
            { month: "June 2026", note: "Stock market up, Workplace pension value updated.", status: "complete" },
            { month: "May 2026", note: "Baseline snapshot created.", status: "complete" }
          ];
        }
      });

      // Temporary Plan Form states
      const [newPlanName, setNewPlanName] = useState("Cash buffer build-up");
      const [newPlanStartMonth, setNewPlanStartMonth] = useState("2026-05");
      const [newPlanEndMonth, setNewPlanEndMonth] = useState("2026-10");
      const [newPlanAmounts, setNewPlanAmounts] = useState({});

      // Viewport-positioned calendar matrix tooltip state
      const [calendarTooltip, setCalendarTooltip] = useState({ text: "", x: 0, y: 0, visible: false });

      // Hover metrics states for Charts
      const svgRef = useRef(null);
      const [hoveredPoint, setHoveredPoint] = useState(null);

      // --- Auto-Save to LocalStorage ---
      useEffect(() => {
        localStorage.setItem('sp_v2_income', monthlyIncome);
        localStorage.setItem('sp_v2_fixed', fixedExpenses);
        localStorage.setItem('sp_v2_debt', debtRepayment);
        localStorage.setItem('sp_v2_savings', investmentsSavings);
        localStorage.setItem('sp_v2_curr_age', currentAge);
        localStorage.setItem('sp_v2_ret_age', retirementAge);
        localStorage.setItem('sp_v2_growth', yearlyGrowth);
        localStorage.setItem('sp_v2_sim_inputs', JSON.stringify(simulationInputs));
        localStorage.setItem('sp_v2_accounts', JSON.stringify(accounts));
        localStorage.setItem('sp_v2_debts', JSON.stringify(debts));
        localStorage.setItem('sp_v2_temp_plans', JSON.stringify(temporaryPlans));
        localStorage.setItem('sp_v2_update_complete', monthlyUpdateComplete);
        localStorage.setItem('sp_v2_update_confirmed', JSON.stringify(monthlyUpdateConfirmed));
        localStorage.setItem('sp_v2_update_note', monthlyUpdateNote);
        localStorage.setItem('sp_v2_update_history', JSON.stringify(monthlyUpdateHistory));
      }, [monthlyIncome, fixedExpenses, debtRepayment, investmentsSavings, currentAge, retirementAge, yearlyGrowth, simulationInputs, accounts, debts, temporaryPlans, monthlyUpdateComplete, monthlyUpdateConfirmed, monthlyUpdateNote, monthlyUpdateHistory]);

      // Synchronize allocations dynamically on parameter updates
      const handleSimChange = (field, val) => {
        const numericVal = parseFloat(val) || 0;
        setSimulationInputs(prev => ({ ...prev, [field]: numericVal }));
      };

      const handleAccountBalanceChange = (accountId, val) => {
        const numericVal = parseFloat(val) || 0;
        setAccounts(prev => prev.map(a => a.id === accountId ? { ...a, balance: numericVal } : a));
      };

      const handleDebtBalanceChange = (debtId, val) => {
        const numericVal = parseFloat(val) || 0;
        setDebts(prev => prev.map(d => d.id === debtId ? { ...d, balance: numericVal } : d));
      };

      // Combined Asset pools
      const totalAssets = accounts.reduce((sum, acc) => sum + acc.balance, 0);
      const totalDebts = debts.reduce((sum, d) => sum + d.balance, 0);
      const netWorth = totalAssets - totalDebts;

      const accessibleNow = accounts.filter(a => a.type === 'Accessible').reduce((sum, a) => sum + a.balance, 0);
      const lockedForLater = accounts.filter(a => a.type === 'Locked').reduce((sum, a) => sum + a.balance, 0);
      const restricted = accounts.filter(a => a.type === 'Restricted').reduce((sum, a) => sum + a.balance, 0);

      // Discretionary calculation
      const discretionary = Math.max(0, monthlyIncome - (fixedExpenses + debtRepayment + investmentsSavings));
      const surplus = monthlyIncome - (fixedExpenses + debtRepayment + investmentsSavings);

      // Projection Compound Logic
      // Constrain calculations to prevent infinite loops from corrupted localStorage values
      const yearsToRetirement = Math.min(100, Math.max(1, retirementAge - currentAge || 1));
      const futureEstimateTotal = useMemo(() => {
        let currentPrincipal = totalAssets;
        let monthlyAddition = investmentsSavings;
        let monthlyRate = (yearlyGrowth / 100) / 12;
        let totalMonths = Math.min(1200, yearsToRetirement * 12);
        let compoundingTotal = currentPrincipal;

        for (let i = 0; i < totalMonths; i++) {
          compoundingTotal = compoundingTotal * (1 + monthlyRate) + monthlyAddition;
        }
        return Math.round(compoundingTotal);
      }, [totalAssets, investmentsSavings, yearlyGrowth, yearsToRetirement]);

      const projectionPoints = useMemo(() => {
        const points = [];
        let currentVal = totalAssets;
        let monthlyAddition = investmentsSavings;
        let monthlyRate = (yearlyGrowth / 100) / 12;

        points.push({ age: currentAge, amount: Math.round(currentVal) });

        const maxYears = Math.min(100, yearsToRetirement);
        for (let year = 1; year <= maxYears; year++) {
          for (let m = 0; m < 12; m++) {
            currentVal = currentVal * (1 + monthlyRate) + monthlyAddition;
          }
          points.push({ age: currentAge + year, amount: Math.round(currentVal) });
        }
        return points;
      }, [totalAssets, investmentsSavings, yearlyGrowth, yearsToRetirement, currentAge]);

      // Mock Performance Historical Data (12 Months back)
      const performanceHistory = useMemo(() => {
        return [
          { month: "Jul", value: 41200 },
          { month: "Aug", value: 42150 },
          { month: "Sep", value: 43400 },
          { month: "Oct", value: 44920 },
          { month: "Nov", value: 45780 },
          { month: "Dec", value: 47210 },
          { month: "Jan", value: 48900 },
          { month: "Feb", value: 49500 },
          { month: "Mar", value: 50850 },
          { month: "Apr", value: 52100 },
          { month: "May", value: 53950 },
          { month: "Jun", value: totalAssets }
        ];
      }, [totalAssets]);

      // SVG mouse hover logic for historical chart
      const handleHistMouseMove = (e) => {
        if (!svgRef.current) return;
        const rect = svgRef.current.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const percentX = Math.max(0, Math.min(1, mouseX / rect.width));
        const index = Math.min(performanceHistory.length - 1, Math.max(0, Math.round(percentX * (performanceHistory.length - 1))));
        const point = performanceHistory[index];
        if (point) {
          const x = (index / (performanceHistory.length - 1)) * 500;
          const maxVal = Math.max(...performanceHistory.map(p => p.value));
          const minVal = Math.min(...performanceHistory.map(p => p.value)) * 0.95;
          const ratio = (point.value - minVal) / ((maxVal - minVal) || 1);
          const y = 150 - (ratio * 100) - 20;
          setHoveredPoint({ ...point, x, y, pctX: (index / (performanceHistory.length - 1)) * 100 });
        }
      };

      // SVG mouse hover logic for projections chart
      const handleProjMouseMove = (e) => {
        if (!svgRef.current || projectionPoints.length === 0) return;
        const rect = svgRef.current.getBoundingClientRect();

                              </div>
                            </div>
                            <p className="helper-text text-xs text-earth-muted mt-2">Use this for things like Lifetime ISA: “put £1,000 in for 4 months every year”. It automatically rolls year-on-year.</p>
                            <form onSubmit={handleCreateYearlyPattern} className="settings-form contribution-calendar-form mt-4 space-y-3">
                              <label className="flex flex-col text-xs font-bold text-white">
                                Plan name / reason
                                <input name="pattern_name" type="text" defaultValue="Yearly LISA fill" className="input-standard mt-1 p-2 rounded border border-[var(--border)] bg-[var(--bg)] text-xs text-white" required />
                              </label>
                              <label className="flex flex-col text-xs font-bold text-white">
                                Account
                                <select name="pattern_account" className="input-standard mt-1 p-2 rounded border border-[var(--border)] bg-[var(--bg)] text-xs text-white" required>
                                  <option value="">Choose account…</option>
                                  {accounts.map(acc => (
                                    <option key={acc.id} value={acc.id}>{acc.name} ({acc.code})</option>
                                  ))}
                                </select>
                              </label>
                              <div className="grid grid-cols-2 gap-2">
                                <label className="flex flex-col text-xs font-bold text-white">
                                  First start month
                                  <input name="pattern_start" type="month" defaultValue="2026-05" className="input-standard mt-1 p-2 rounded border border-[var(--border)] bg-[var(--bg)] text-xs text-white" required />
                                </label>
                                <label className="flex flex-col text-xs font-bold text-white">
                                  Monthly amount
                                  <input name="pattern_amount" type="number" step="0.01" defaultValue="1000" className="input-standard mt-1 p-2 rounded border border-[var(--border)] bg-[var(--bg)] text-xs text-white" required />
                                </label>
                              </div>
                              <div className="grid grid-cols-2 gap-2">
                                <label className="flex flex-col text-xs font-bold text-white">
                                  Months each year
                                  <input name="pattern_months" type="number" defaultValue="4" max="12" min="1" className="input-standard mt-1 p-2 rounded border border-[var(--border)] bg-[var(--bg)] text-xs text-white" required />
                                </label>
                                <label className="flex flex-col text-xs font-bold text-white">
                                  Number of years
                                  <input name="pattern_years" type="number" defaultValue="2" max="10" min="1" className="input-standard mt-1 p-2 rounded border border-[var(--border)] bg-[var(--bg)] text-xs text-white" required />
                                </label>
                              </div>
                              <button type="submit" className="badge badge-primary-action w-100 py-2 bg-earth-sage hover:bg-earth-sageHover text-white font-bold rounded mt-2">
                                Create yearly pattern
                              </button>
                            </form>
                          </section>
                        </div>
                      </div>
                    );
                  })()}

                  {/* SUB-TAB: Monthly Update */}
                  {budgetTab === 'update' && (() => {
                    const totalPersonal = accounts.reduce((sum, acc) => {
                      const isConfirmed = monthlyUpdateConfirmed[acc.id] !== false;
                      if (!isConfirmed) return sum;
                      const cell = getCellData(acc.id, "2026-07");
                      return sum + cell.amount;
                    }, 0);
                    
                    const handleConfirmToggle = (accId) => {
                      setMonthlyUpdateConfirmed(prev => ({
                        ...prev,
                        [accId]: prev[accId] === false ? true : false
                      }));
                    };

                    const handleCompleteUpdate = (e) => {
                      e.preventDefault();
                      setMonthlyUpdateComplete(true);
                      setMonthlyUpdateHistory(prev => [
                        { month: "July 2026", note: monthlyUpdateNote || "Completed July monthly update snapshot.", status: "complete" },
                        ...prev.filter(h => h.month !== "July 2026")
                      ]);
                    };

                    const handleReopenUpdate = () => {
                      setMonthlyUpdateComplete(false);
                      setMonthlyUpdateHistory(prev => prev.filter(h => h.month !== "July 2026"));
                    };

                    const getCellData = (accId, monthKey) => {
                      const defaultContribution = 
                        accId === 'sip1' ? (simulationInputs.investEngineMonthly || 0) :
                        accId === 'isa1' ? (simulationInputs.stocksMonthly || 0) :
                        accId === 'pension1' ? (simulationInputs.t212Monthly || 0) :
                        accId === 'isa2' ? (simulationInputs.bondsMonthly || 0) :
                        accId === 'lisa1' ? (simulationInputs.lisaMonthly || 0) : 0;
                      
                      const matchingPlans = temporaryPlans.filter(p => p.accountId === accId && monthKey >= p.startMonth && monthKey <= p.endMonth);
                      if (matchingPlans.length > 0) {
                        return { amount: matchingPlans[matchingPlans.length - 1].amount, hasOverride: true };
                      }
                      return { amount: defaultContribution, hasOverride: false };
                    };

                    return (
                      <div className="space-y-6 animate-in fade-in duration-500">
                        <section className="card highlight mb-1 month-accent-7 review-hero-card">
                          <div className="hero-top">
                            <div>
                              <p className="eyebrow">Monthly Update</p>
                              <h2 className="hero-value">July 2026 Update</h2>
                              <p className="hero-subtitle">Confirm what happened, update any balances that changed, then finish with a quick note.</p>
                            </div>
                            <div className="hero-actions-col">
                              {monthlyUpdateComplete ? (
                                <div className="space-y-2 text-right">
                                  <span className="badge badge-complete block font-bold text-emerald-400 bg-emerald-500/10 border border-emerald-500/30 px-3 py-1 rounded">✓ Complete</span>
                                  <button 
                                    type="button" 
                                    className="badge badge-meta text-xs cursor-pointer underline text-earth-muted hover:text-white"
                                    onClick={handleReopenUpdate}
                                  >
                                    Reopen Monthly Update
                                  </button>
                                </div>
                              ) : (
                                <button 
                                  onClick={handleCompleteUpdate} 
                                  className="badge badge-primary-action px-4 py-2 bg-earth-sage hover:bg-earth-sageHover text-white font-bold rounded"
                                >
                                  Complete July update
                                </button>
                              )}
                            </div>
                          </div>
                          <div className="hero-strip">
                            <div className="hero-strip-stat">
                              <span>Status</span>
                              <strong>{monthlyUpdateComplete ? "Complete" : "In progress"}</strong>
                            </div>
                            <div className="hero-strip-stat">
                              <span>Accounts to update</span>
                              <strong>{accounts.length}</strong>
                            </div>
                            <div className="hero-strip-stat">
                              <span>Total from you</span>
                              <strong>£{totalPersonal.toLocaleString()}</strong>
                            </div>
                          </div>
                        </section>

                        {!monthlyUpdateComplete ? (
                          <>
                            <section className="panel mb-1">
                              <div className="section-header">
                                <div>
                                  <p className="eyebrow">Step 1 of 3</p>
                                  <h3 className="text-base font-bold text-white">Confirm July contributions</h3>
                                </div>
                              </div>
                              <p className="helper-text text-xs text-earth-muted mt-2">Uncheck any contribution you didn't make this month. Skipped contributions won't reduce your take-home pay.</p>
                              <div className="review-list space-y-3 mt-4">
                                {accounts.map(acc => {
                                  const cell = getCellData(acc.id, "2026-07");
                                  const isConfirmed = monthlyUpdateConfirmed[acc.id] !== false;
                                  return (
                                    <div key={acc.id} className="flex justify-between items-center bg-[var(--bg-soft)] p-3 rounded-lg border border-[var(--border)]">
                                      <label className="flex items-center space-x-3 cursor-pointer">
                                        <input 
                                          type="checkbox" 
                                          checked={isConfirmed} 
                                          onChange={() => handleConfirmToggle(acc.id)} 
                                        />
                                        <div>
                                          <strong className="text-sm text-white block">{acc.name}</strong>
                                          <span className="text-[10px] text-earth-muted">{acc.code}</span>
                                        </div>
                                      </label>
                                      <div className="text-right">
                                        <span className="text-sm font-mono text-white font-bold">£{cell.amount.toLocaleString()}</span>
                                        {!isConfirmed && <span className="text-[10px] text-earth-rust block font-bold">SKIPPED</span>}
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>
                            </section>

                            <section className="panel mb-1">
                              <div className="section-header">
                                <div>
                                  <p className="eyebrow">Step 2 of 3</p>
                                  <h3 className="text-base font-bold text-white">Update July account balances</h3>
                                </div>
                              </div>
                              <p className="helper-text text-xs text-earth-muted mt-2">Enter the actual statement balance of each account at month-end to capture investment growth or interest.</p>
                              <div className="space-y-3 mt-4">
                                {accounts.map(acc => (
                                  <div key={acc.id} className="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-[var(--bg-soft)] p-3 rounded-lg border border-[var(--border)] gap-2">
                                    <div>
                                      <strong className="text-sm text-white block">{acc.name}</strong>
                                      <span className="text-[10px] text-earth-muted">{acc.code}</span>
                                    </div>
                                    <div className="flex items-center space-x-2 w-100 sm:w-auto">
                                      <span className="text-sm text-earth-muted font-mono">£</span>
                                      <input 
                                        type="number" 
                                        value={acc.balance} 
                                        onChange={e => handleAccountBalanceChange(acc.id, e.target.value)} 
                                        className="input-standard p-1 text-xs w-[120px] text-right font-bold text-white border border-[var(--border)] bg-[var(--bg)] rounded"
                                      />
                                    </div>
                                  </div>
                                ))}
                              </div>
                            </section>

                            <section className="panel mb-1" id="monthly-note">
                              <div className="section-header">
                                <div>
                                  <p className="eyebrow">Step 3 of 3</p>
                                  <h3 className="text-base font-bold text-white">Add a monthly update note</h3>
                                </div>
                              </div>
                              <div className="mt-3">
                                <textarea 
                                  value={monthlyUpdateNote}
                                  onChange={e => setMonthlyUpdateNote(e.target.value)}
                                  placeholder="e.g. Stock market had a slight correction; SIPP contributions went through cleanly."
                                  className="w-100 p-3 text-xs text-white border border-[var(--border)] bg-[var(--bg)] rounded-lg min-h-[80px]"
                                />
                              </div>
                              <div className="mt-4">
                                <button 
                                  onClick={handleCompleteUpdate} 
                                  className="w-100 py-3 bg-earth-sage hover:bg-earth-sageHover text-white font-bold rounded-lg text-sm transition"
                                >
                                  Complete and Save July Update Snapshot
                                </button>
                              </div>
                            </section>
                          </>
                        ) : (
                          <div className="card highlight p-6 text-center space-y-3">
                            <div className="text-4xl">🎉</div>
                            <h3 className="text-lg font-bold text-white">July 2026 Monthly Update Complete!</h3>
                            <p className="text-xs text-earth-muted max-w-sm mx-auto">Your asset balances and net worth have been updated, and your snapshot is locked. You can view past updates below.</p>
                            <button 
                              type="button" 
                              onClick={handleReopenUpdate} 
                              className="badge badge-meta  text-earth-sage font-bold border border-earth-sage/20 px-4 py-2 rounded mt-2 cursor-pointer hover:bg-earth-sage/20"
                            >
                              Reopen to modify
                            </button>
                          </div>
                        )}

                        <section className="panel mb-1">
                          <h3 className="text-sm font-bold text-white mb-3">Snapshot History</h3>
                          <div className="space-y-2">
                            {monthlyUpdateHistory.map(h => (
                              <div key={h.month} className="bg-[var(--bg-soft)] p-3 rounded-lg border border-[var(--border)] text-xs flex justify-between items-start gap-4">
                                <div>
                                  <strong className="text-white font-bold block">{h.month}</strong>
                                  <p className="text-earth-muted mt-1 leading-relaxed">{h.note}</p>
                                </div>
                                <span className="text-[10px] bg-emerald-500/10 text-emerald-400 font-bold border border-emerald-500/20 px-2 py-0.5 rounded uppercase">COMPLETE</span>
                              </div>
                            ))}
                          </div>
                        </section>
                      </div>
                    );
                  })()}
                </div>
              )}

              {/* VIEW 7: SETTINGS SCREEN */}
              {appView === "settings" && (
                <div className="space-y-6">
                  {/* Settings overview */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="card mb-1 space-y-4 sandbox-tile">
                      <h4 className="text-base font-bold text-white font-mono">
                        <svg className="w-4 h-4 inline mr-2 text-earth-sage" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 0 1-3-3V3.75a3 3 0 0 1 3-3h13.5a3 3 0 0 1 3 3v7.5a3 3 0 0 1-3 3m-13.5 0a3 3 0 0 0-3 3v3.75a3 3 0 0 0 3 3h13.5a3 3 0 0 0 3-3v-3.75a3 3 0 0 0-3-3M6 3.75h.008v.008H6V3.75Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0ZM6 17.25h.008v.008H6v-.008Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"></path></svg>
                        Self-Hosted Safety Checklist
                      </h4>
                      <ul className="space-y-2 text-xs text-earth-muted font-sans mt-2">
                        <li className="flex items-center space-x-2">
                          <svg className="w-4 h-4 inline mr-2 text-emerald-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"></path></svg>
                          <span>SQLite database storage active</span>
                        </li>
                        <li className="flex items-center space-x-2">
                          <svg className="w-4 h-4 inline mr-2 text-emerald-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"></path></svg>
                          <span>HTTPS and Reverse Proxy connection secure</span>
                        </li>
                        <li className="flex items-center space-x-2">
                          <svg className="w-4 h-4 inline mr-2 text-emerald-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"></path></svg>
                          <span>Auto-backup commit scheduler active</span>
                        </li>
                      </ul>
                    </div>

                    <div className="card mb-1 space-y-4 sandbox-tile">
                      <h4 className="text-base font-bold text-white font-mono">
                        <svg className="w-4 h-4 inline mr-2 text-earth-gold" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M11.5 5.5v3.5m0-3.5h-2m2 0h2m-6 3.5v3.5a3.5 3.5 0 0 0 7 0v-3.5m-7 0h7"></path></svg>
                        API Integrations (Simulated)
                      </h4>
                      <div className="space-y-3 text-xs">
                        <div className="flex justify-between items-center bg-[var(--bg-soft)] p-3 rounded-lg border border-[var(--border)]">
                          <div>
                            <p className="font-bold text-white">Trading 212 Sync</p>
                            <p className="text-[10px] text-earth-muted mt-0.5">Automated cash/holdings retrieve</p>
                          </div>
                          <span className="text-[9px] uppercase font-mono text-emerald-500 bg-emerald-500/10 border border-emerald-500/20 px-2 py-0.5 rounded">CONNECTED</span>
                        </div>
                        <div className="flex justify-between items-center bg-[var(--bg-soft)] p-3 rounded-lg border border-[var(--border)]">
                          <div>
                            <p className="font-bold text-white">InvestEngine Sync</p>
                            <p className="text-[10px] text-earth-muted mt-0.5">ISA & SIPP allocations</p>
                          </div>
                          <span className="text-[9px] uppercase font-mono text-emerald-500 bg-emerald-500/10 border border-emerald-500/20 px-2 py-0.5 rounded">CONNECTED</span>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Backup / Export Options */}
                  <div className="card mb-1 space-y-4 sandbox-tile">
                    <h4 className="text-base font-bold text-white font-mono">
                      <svg className="w-4 h-4 inline mr-2 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3Z"></path></svg>
                      Backup Restore & Import
                    </h4>
                    <p className="text-xs text-earth-muted font-sans">Download your Sandbox workspace configurations or load a previously exported session.</p>
                    <div className="flex items-center space-x-3 pt-2">
                      <button 
                        onClick={handleExport}
                        className="flex items-center space-x-1.5 bg-[var(--bg)] hover:bg-[var(--border)] text-white font-semibold px-4 py-2 rounded-lg transition border border-[var(--border)] cursor-pointer text-xs"
                      >
                        <svg className="w-3.5 h-3.5 inline mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"></path></svg>
                        <span>Download JSON</span>
                      </button>
                      <label className="flex items-center space-x-1.5 bg-[var(--bg)] hover:bg-[var(--border)] text-white font-semibold px-4 py-2 rounded-lg transition border border-[var(--border)] cursor-pointer text-xs">
                        <svg className="w-3.5 h-3.5 inline mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"></path></svg>
                        <span>Upload JSON</span>
                        <input type="file" accept=".json" onChange={handleImport} className="hidden" />
                      </label>
                    </div>
                  </div>
                </div>
              {calendarTooltip.visible && (
                <div 
                  className="calendar-tooltip visible font-bold"
                  style={{
                    position: 'absolute',
                    left: `${calendarTooltip.x}px`,
                    top: `${calendarTooltip.y}px`,
                    transform: 'translate(-50%, -100%)',
                    pointerEvents: 'none',
                    zIndex: 1050
                  }}
                >
                  {calendarTooltip.text}
                </div>
              )}
              <div 
                className={`calendar-tooltip font-bold ${calendarTooltip.visible ? 'visible' : ''}`}
                style={{
                  position: 'absolute',
                  left: `${calendarTooltip.x}px`,
                  top: `${calendarTooltip.y}px`,
                  transform: 'translate(-50%, -100%)',
                  pointerEvents: 'none',
                  zIndex: 1050,
                  display: calendarTooltip.visible ? 'block' : 'none'
                }}
              >
                {calendarTooltip.text}
              </div>
          </main>

          {/* Real App Mobile Bottom Nav */}
          <nav className="bottom-nav" aria-label="Main navigation">
            <button onClick={() => { setAppView('overview'); setHoveredPoint(null); }} className={`bottom-nav-item ${appView === 'overview' ? 'active' : ''}`}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
              <span>Overview</span>
            </button>
            <button onClick={() => { setAppView('performance'); setHoveredPoint(null); }} className={`bottom-nav-item ${appView === 'performance' ? 'active' : ''}`}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16l3-4 3 2 4-7"/></svg>
              <span>History</span>
            </button>
            <button onClick={() => { setAppView('allowances'); setHoveredPoint(null); }} className={`bottom-nav-item ${appView === 'allowances' ? 'active' : ''}`}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
              <span>Accounts</span>
            </button>
            <button onClick={() => { setAppView('projections'); setHoveredPoint(null); }} className={`bottom-nav-item ${appView === 'projections' ? 'active' : ''}`}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              <span>Forecast</span>
            </button>
            <button onClick={() => { setAppView('budget'); setHoveredPoint(null); }} className={`bottom-nav-item ${appView === 'budget' ? 'active' : ''}`}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
              <span>Budget</span>
            </button>
            <button onClick={() => { setAppView('settings'); setHoveredPoint(null); }} className={`bottom-nav-item ${appView === 'settings' ? 'active' : ''}`}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              <span>Settings</span>
            </button>
          </nav>

        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(<App />);
  </script>
</body>
</html>
