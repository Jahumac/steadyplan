<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SteadyPlan · Interactive Demo Showcase</title>
  <meta name="description" content="A pristine, local-first interactive financial sandbox planner for SteadyPlan. Experience the self-hosted interface with mock historical datasets.">
  <meta name="color-scheme" content="light dark">

  <script>
    (function () {
      try {
        var storedTheme = localStorage.getItem('steadyplan-site-theme');
        if (storedTheme === 'dark' || storedTheme === 'light') {
          document.documentElement.dataset.theme = storedTheme;
        }
      } catch (error) {}
    })();
  </script>

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Global Site Stylesheet -->
  <link rel="stylesheet" href="./assets/site.css?v=2">
  <link rel="stylesheet" href="./assets/css/styles.css">
  <!-- React & ReactDOM (Local Vendor Assets) -->
  <script src="./assets/js/vendor/react.production.min.js"></script>
  <script src="./assets/js/vendor/react-dom.production.min.js"></script>
  
  <!-- Babel Standalone (Local Vendor Assets) -->
  <script src="./assets/js/vendor/babel.min.js"></script>

  <!-- Tailwind CSS (Local Vendor Assets) -->
  <script src="./assets/js/vendor/tailwindcss.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            earth: {
              cream: 'var(--bg)',
              light: 'var(--bg-soft)',
              border: 'var(--border)',
              muted: 'var(--muted)',
              charcoal: 'var(--text)',
              sage: 'var(--accent)',
              sageHover: 'var(--accent-2)',
              gold: '#cba358',
              rust: '#c86a5a'
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Force vertical scrollbar to prevent horizontal page shift when navigating */
    html {
      overflow-y: scroll;
    }
    
    /* Lock container width to match site.css exactly, overriding Tailwind's container utility */
    .container {
      max-width: var(--max) !important;
      width: 100% !important;
      margin: 0 auto !important;
      padding: 0 1.25rem !important;
    }

    /* Floating Showcase Demo Banner */
    .demo-banner {
      background: var(--text) !important;
      color: var(--bg) !important;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 0.45rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      z-index: 1001;
      position: sticky;
      top: 0;
      border-bottom: 1px solid var(--border);
    }
    .demo-banner-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .demo-banner-actions a {
      color: var(--accent) !important;
      text-transform: none;
      font-weight: 700;
      text-decoration: underline;
    }
    .demo-banner-actions a:hover {
      color: var(--accent-2) !important;
    }
    .demo-install-btn {
      background: var(--bg) !important;
      color: var(--text) !important;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      text-decoration: none !important;
      font-size: 0.6rem;
    }
    .demo-install-btn:hover {
      background: var(--border) !important;
      color: var(--text) !important;
    }
    
    /* App header bar matching self-hosted layout */
    .app-header {
      background: rgba(15, 23, 42, 0.96) !important;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 1.9rem; /* immediately below demo banner */
      z-index: 1000;
      backdrop-filter: blur(10px);
    }
    
    /* Navigation inside header */
    .app-header nav button {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.45rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.15s ease, background 0.15s ease;
    }
    .app-header nav button:hover {
      color: var(--text);
      background: rgba(255,255,255,0.05);
    }
    .app-header nav button.active {
      color: var(--accent) !important;
      background: rgba(56, 189, 248, 0.10) !important;
    }
    
    /* Bottom Navigation for mobile screens */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 62px;
      background: rgba(15, 23, 42, 0.98);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 1000;
      padding: 0 0.5rem;
      backdrop-filter: blur(10px);
    }
    @media (min-width: 768px) {
      .bottom-nav {
        display: none;
      }
    }
    @media (max-width: 767px) {
      .app-header nav {
        display: none; /* Hide top nav on mobile, use bottom nav */
      }
    }
    
    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.6rem;
      font-weight: 600;
      cursor: pointer;
      gap: 0.2rem;
    }
    .bottom-nav-item svg {
      width: 18px;
      height: 18px;
    }
    .bottom-nav-item.active {
      color: var(--accent) !important;
    }

    .month-active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 3px;
      background-color: var(--accent);
      border-radius: 9999px;
    }
    
    /* Fix potential Tailwind override issues on inputs in light/dark modes */
    input, select {
      background-color: var(--bg-soft) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    input:focus, select:focus {
      border-color: var(--accent) !important;
    }

    /* Global Hover Glow effect matching the self-hosted Flask (Docker) app */
    .sandbox-tile {
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .sandbox-tile:hover {
      transform: translateY(-2px);
      border-color: var(--accent) !important;
      box-shadow: 0 0 15px color-mix(in srgb, var(--accent) 22%, transparent) !important;
    }
  </style>
</head>
<body>

  <!-- Interactive Demo Mode Top Banner -->
  <div class="demo-banner">
    <div class="flex items-center space-x-2">
      <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
      <span>Showcase Mode (Sandbox)</span>
    </div>
    <div class="demo-banner-actions">
      <a href="./index.html">&larr; Back to Website</a>
      <a href="./docs/install.html" class="demo-install-btn">Self-Host with Docker</a>
    </div>
  </div>

  <!-- Diagnostic Error Overlay -->
  <script>
    window.addEventListener('error', function(e) {
      const app = document.getElementById('app');
      if (app) {
        app.innerHTML = `
          <div class="flex flex-col items-center justify-center min-h-[75vh] p-8 text-center text-red-500">
            <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            <h2 class="text-2xl font-bold mb-2">Diagnostic Error</h2>
            <p class="font-mono text-sm bg-red-100 text-red-900 p-4 rounded-xl text-left w-full max-w-2xl overflow-x-auto">
              Message: ${e.message}<br>
              File: ${e.filename}<br>
              Line: ${e.lineno}:${e.colno}
            </p>
          </div>
        `;
      }
    });
    window.addEventListener('unhandledrejection', function(e) {
      const app = document.getElementById('app');
      if (app) {
        app.innerHTML = `
          <div class="flex flex-col items-center justify-center min-h-[75vh] p-8 text-center text-red-500">
            <h2 class="text-2xl font-bold mb-2">Promise Rejection</h2>
            <p class="font-mono text-sm bg-red-100 text-red-900 p-4 rounded-xl text-left w-full max-w-2xl">${e.reason}</p>
          </div>
        `;
      }
    });
  </script>

  <!-- React mounting Node -->
  <div id="app">
    <!-- Premium Centered Loader -->
    <div class="flex flex-col items-center justify-center min-h-[75vh] space-y-8 animate-in fade-in duration-700">
      <div class="relative flex items-center justify-center w-24 h-24">
        <!-- Outer atmospheric rings -->
        <div class="absolute inset-0 rounded-full border-2 border-earth-sage opacity-20 animate-ping"></div>
        <div class="absolute inset-3 rounded-full border border-earth-sage opacity-40 animate-pulse"></div>
        
        <!-- Core rotating reactor -->
        <svg class="animate-spin text-earth-sage w-12 h-12 relative z-10" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
          <path class="opacity-90" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </div>
      
      <div class="text-center space-y-2">
        <h2 class="text-lg md:text-xl font-mono font-bold text-earth-charcoal tracking-widest uppercase">Building Showcase Environment</h2>
        <p class="text-sm font-sans text-earth-muted animate-pulse">Compiling local React modules and downloading vendor scripts...</p>
      </div>
    </div>
  </div>

  <!-- React Sandbox App -->
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    function App() {
      // Top Shell View tab selector: overview, performance, allowances, projections, budget, debts, settings
      const [appView, setAppView] = useState("overview");
      const [selectedMonth, setSelectedMonth] = useState("Jul");

      // Financial Planning State Variables (Fictitious demo data)
      const [monthlyIncome, setIncome] = useState(() => Number(localStorage.getItem('sp_v2_income')) || 3500.00);

      // Derived States via useMemo to prevent side-effects and infinite rendering loops
      const fixedExpenses = useMemo(() => {
        const next = simulationInputs || {};
        return parseFloat(((next.rent || 0) + (next.mobile || 0) + (next.internet || 0) + (next.travel || 0) + (next.cloud || 0) + (next.subscriptions || 0) + (next.ai || 0)).toFixed(2));
      }, [simulationInputs]);

      const debtRepayment = useMemo(() => {
        const next = simulationInputs || {};
        return parseFloat((next.netwestCC || 0).toFixed(2));
      }, [simulationInputs]);

      const investmentsSavings = useMemo(() => {
        const next = simulationInputs || {};
        return parseFloat(((next.stocksMonthly || 0) + (next.lisaMonthly || 0) + (next.investEngineMonthly || 0) + (next.bondsMonthly || 0) + (next.t212Monthly || 0) + (next.cashParkMonthly || 0)).toFixed(2));
      }, [simulationInputs]);

      // Connected Financial Assumptions (Safely clamped against local storage corruption)
      const [currentAge, setCurrentAge] = useState(() => {
        const val = Number(localStorage.getItem('sp_v2_curr_age'));
        return (!isNaN(val) && val > 0 && val < 120) ? val : 32;
      });
      const [retirementAge, setRetirementAge] = useState(() => {
        const val = Number(localStorage.getItem('sp_v2_ret_age'));
        return (!isNaN(val) && val > 0 && val < 120) ? val : 60;
      });
      const [yearlyGrowth, setYearlyGrowth] = useState(() => {
        const val = Number(localStorage.getItem('sp_v2_growth'));
        return (!isNaN(val) && val >= -100 && val <= 100) ? val : 6.5;
      });

      // Fictitious Debt Planner State (Protected from massive array injection)
      const [debts, setDebts] = useState(() => {
        try {
          const cached = localStorage.getItem('sp_v2_debts');
          const parsed = cached ? JSON.parse(cached) : null;
          return Array.isArray(parsed) ? parsed.slice(0, 50) : [
            { id: 'd1', name: "Sainsbury's Credit Card", balance: 1450.00, rate: 18.9, payoffPayment: 70.00 },
            { id: 'd2', name: "Barclaycard Purchase", balance: 2200.00, rate: 0.0, payoffPayment: 80.00 }
          ];
        } catch {
          return [
            { id: 'd1', name: "Sainsbury's Credit Card", balance: 1450.00, rate: 18.9, payoffPayment: 70.00 },
            { id: 'd2', name: "Barclaycard Purchase", balance: 2200.00, rate: 0.0, payoffPayment: 80.00 }
          ];
        }
      });

      // Detailed Simulation Input Object (Protected from JSON parse errors)
      const [simulationInputs, setSimulationInputs] = useState(() => {
        const defaultInputs = {
          rent: 850.00,
          mobile: 15.00,
          internet: 35.00,
          travel: 120.00,
          cloud: 10.00,
          subscriptions: 20.00,
          ai: 25.00,
          netwestCC: 150.00,
          stocksMonthly: 400.00,
          lisaMonthly: 100.00,
          investEngineMonthly: 200.00,
          bondsMonthly: 100.00,
          t212Monthly: 300.00,
          cashParkMonthly: 0.00,
          goingOut: 250.00
        };
        try {
          const cached = localStorage.getItem('sp_v2_sim_inputs');
          return cached ? JSON.parse(cached) : defaultInputs;
        } catch {
          return defaultInputs;
        }
      });

      // Asset Accounts Model (Protected from massive array injection)
      const [accounts, setAccounts] = useState(() => {
        try {
          const cached = localStorage.getItem('sp_v2_accounts');
          const parsed = cached ? JSON.parse(cached) : null;
          return Array.isArray(parsed) ? parsed.slice(0, 50) : [
            { id: 'sip1', name: "SIPP Pension Fund", balance: 24500.00, type: 'Locked', code: 'Generic SIPP Provider' },
            { id: 'isa1', name: "Stocks & Shares ISA", balance: 12350.00, type: 'Accessible', code: 'Trading 212 ISA' },
            { id: 'pension1', name: "Workplace Pension", balance: 8450.00, type: 'Locked', code: 'Standard Life Workplace' },
            { id: 'isa2', name: "Emergency Savings Pot", balance: 5000.00, type: 'Accessible', code: 'High-Yield Savings' },
            { id: 'lisa1', name: "Lifetime ISA (LISA)", balance: 4200.00, type: 'Restricted', code: 'Dodl LISA' }
          ];
        } catch {
          return [
            { id: 'sip1', name: "SIPP Pension Fund", balance: 24500.00, type: 'Locked', code: 'Generic SIPP Provider' },
            { id: 'isa1', name: "Stocks & Shares ISA", balance: 12350.00, type: 'Accessible', code: 'Trading 212 ISA' },
            { id: 'pension1', name: "Workplace Pension", balance: 8450.00, type: 'Locked', code: 'Standard Life Workplace' },
            { id: 'isa2', name: "Emergency Savings Pot", balance: 5000.00, type: 'Accessible', code: 'High-Yield Savings' },
            { id: 'lisa1', name: "Lifetime ISA (LISA)", balance: 4200.00, type: 'Restricted', code: 'Dodl LISA' }
          ];
        }
      });

      // Hover metrics states for Charts
      const svgRef = useRef(null);
      const [hoveredPoint, setHoveredPoint] = useState(null);

      // --- Auto-Save to LocalStorage ---
      useEffect(() => {
        localStorage.setItem('sp_v2_income', monthlyIncome);
        localStorage.setItem('sp_v2_fixed', fixedExpenses);
        localStorage.setItem('sp_v2_debt', debtRepayment);
        localStorage.setItem('sp_v2_savings', investmentsSavings);
        localStorage.setItem('sp_v2_curr_age', currentAge);
        localStorage.setItem('sp_v2_ret_age', retirementAge);
        localStorage.setItem('sp_v2_growth', yearlyGrowth);
        localStorage.setItem('sp_v2_sim_inputs', JSON.stringify(simulationInputs));
        localStorage.setItem('sp_v2_accounts', JSON.stringify(accounts));
        localStorage.setItem('sp_v2_debts', JSON.stringify(debts));
      }, [monthlyIncome, fixedExpenses, debtRepayment, investmentsSavings, currentAge, retirementAge, yearlyGrowth, simulationInputs, accounts, debts]);

      // Synchronize allocations dynamically on parameter updates
      const handleSimChange = (field, val) => {
        const numericVal = parseFloat(val) || 0;
        setSimulationInputs(prev => ({ ...prev, [field]: numericVal }));
      };

      const handleAccountBalanceChange = (accountId, val) => {
        const numericVal = parseFloat(val) || 0;
        setAccounts(prev => prev.map(a => a.id === accountId ? { ...a, balance: numericVal } : a));
      };

      const handleDebtBalanceChange = (debtId, val) => {
        const numericVal = parseFloat(val) || 0;
        setDebts(prev => prev.map(d => d.id === debtId ? { ...d, balance: numericVal } : d));
      };

      // Combined Asset pools
      const totalAssets = accounts.reduce((sum, acc) => sum + acc.balance, 0);
      const totalDebts = debts.reduce((sum, d) => sum + d.balance, 0);
      const netWorth = totalAssets - totalDebts;

      const accessibleNow = accounts.filter(a => a.type === 'Accessible').reduce((sum, a) => sum + a.balance, 0);
      const lockedForLater = accounts.filter(a => a.type === 'Locked').reduce((sum, a) => sum + a.balance, 0);
      const restricted = accounts.filter(a => a.type === 'Restricted').reduce((sum, a) => sum + a.balance, 0);

      // Discretionary calculation
      const discretionary = Math.max(0, monthlyIncome - (fixedExpenses + debtRepayment + investmentsSavings));

      // Projection Compound Logic
      // Constrain calculations to prevent infinite loops from corrupted localStorage values
      const yearsToRetirement = Math.min(100, Math.max(1, retirementAge - currentAge || 1));
      const futureEstimateTotal = useMemo(() => {
        let currentPrincipal = totalAssets;
        let monthlyAddition = investmentsSavings;
        let monthlyRate = (yearlyGrowth / 100) / 12;
        let totalMonths = Math.min(1200, yearsToRetirement * 12);
        let compoundingTotal = currentPrincipal;

        for (let i = 0; i < totalMonths; i++) {
          compoundingTotal = compoundingTotal * (1 + monthlyRate) + monthlyAddition;
        }
        return Math.round(compoundingTotal);
      }, [totalAssets, investmentsSavings, yearlyGrowth, yearsToRetirement]);

      const projectionPoints = useMemo(() => {
        const points = [];
        let currentVal = totalAssets;
        let monthlyAddition = investmentsSavings;
        let monthlyRate = (yearlyGrowth / 100) / 12;

        points.push({ age: currentAge, amount: Math.round(currentVal) });

        const maxYears = Math.min(100, yearsToRetirement);
        for (let year = 1; year <= maxYears; year++) {
          for (let m = 0; m < 12; m++) {
            currentVal = currentVal * (1 + monthlyRate) + monthlyAddition;
          }
          points.push({ age: currentAge + year, amount: Math.round(currentVal) });
        }
        return points;
      }, [totalAssets, investmentsSavings, yearlyGrowth, yearsToRetirement, currentAge]);

      // Mock Performance Historical Data (12 Months back)
      const performanceHistory = useMemo(() => {
        return [
          { month: "Jul", value: 41200 },
          { month: "Aug", value: 42150 },
          { month: "Sep", value: 43400 },
          { month: "Oct", value: 44920 },
          { month: "Nov", value: 45780 },
          { month: "Dec", value: 47210 },
          { month: "Jan", value: 48900 },
          { month: "Feb", value: 49500 },
          { month: "Mar", value: 50850 },
          { month: "Apr", value: 52100 },
          { month: "May", value: 53950 },
          { month: "Jun", value: totalAssets }
        ];
      }, [totalAssets]);

      // SVG mouse hover logic for historical chart
      const handleHistMouseMove = (e) => {
        if (!svgRef.current) return;
        const rect = svgRef.current.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const percentX = Math.max(0, Math.min(1, mouseX / rect.width));
        const index = Math.min(performanceHistory.length - 1, Math.max(0, Math.round(percentX * (performanceHistory.length - 1))));
        const point = performanceHistory[index];
        if (point) {
          const x = (index / (performanceHistory.length - 1)) * 500;
          const maxVal = Math.max(...performanceHistory.map(p => p.value));
          const minVal = Math.min(...performanceHistory.map(p => p.value)) * 0.95;
          const ratio = (point.value - minVal) / ((maxVal - minVal) || 1);
          const y = 150 - (ratio * 100) - 20;
          setHoveredPoint({ ...point, x, y, pctX: (index / (performanceHistory.length - 1)) * 100 });
        }
      };

      // SVG mouse hover logic for projections chart
      const handleProjMouseMove = (e) => {
        if (!svgRef.current || projectionPoints.length === 0) return;
        const rect = svgRef.current.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const percentX = Math.max(0, Math.min(1, mouseX / rect.width));
        const index = Math.min(projectionPoints.length - 1, Math.max(0, Math.round(percentX * (projectionPoints.length - 1))));
        const point = projectionPoints[index];
        if (point) {
          const x = (index / (projectionPoints.length - 1)) * 500;
          const ratio = point.amount / (futureEstimateTotal || 1);
          const y = 150 - (ratio * 120) - 10;
          setHoveredPoint({ ...point, x, y, pctX: (index / (projectionPoints.length - 1)) * 100 });
        }
      };

      // Backup Download/Upload simulation
      const handleExport = () => {
        const dataStr = JSON.stringify({
          monthlyIncome, fixedExpenses, debtRepayment, investmentsSavings,
          currentAge, retirementAge, yearlyGrowth, simulationInputs, accounts, debts
        }, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `steadyplan_sandbox_workspace.json`;
        link.click();
      };

      const handleImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.monthlyIncome) setIncome(data.monthlyIncome);
            if (data.currentAge) setCurrentAge(data.currentAge);
            if (data.retirementAge) setRetirementAge(data.retirementAge);
            if (data.yearlyGrowth) setYearlyGrowth(data.yearlyGrowth);
            if (data.simulationInputs) setSimulationInputs(data.simulationInputs);
            if (data.accounts) setAccounts(data.accounts);
            if (data.debts) setDebts(data.debts);
            alert("Sandbox dataset imported successfully!");
          } catch (err) {
            alert("Failed to parse JSON file.");
          }
        };
        reader.readAsText(file);
      };

      return (
        <>
          {/* Real App Header Bar */}
          <header className="site-header">
            <div className="site-header-row">
              <h1 className="site-logo">
                <img src="./assets/brand/steadyplan-mark.png" alt="" className="site-logo-mark" aria-hidden="true" />
                <span>SteadyPlan</span>
              </h1>
            </div>
              <nav>
                <a href="#" onClick={(e) => { e.preventDefault(); setAppView('overview'); setHoveredPoint(null); }} className={appView === 'overview' ? 'active' : ''}>Overview</a>
                <a href="#" onClick={(e) => { e.preventDefault(); setAppView('allowances'); setHoveredPoint(null); }} className={appView === 'allowances' ? 'active' : ''}>Accounts</a>
                <a href="#" onClick={(e) => { e.preventDefault(); setAppView('budget'); setHoveredPoint(null); }} className={appView === 'budget' ? 'active' : ''}>Budget</a>
