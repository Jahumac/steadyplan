services:
  shelly:
    image: ghcr.io/jahumac/shelly-finance:latest
    container_name: shelly
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      # Optional: enables Twelve Data price lookups. Leave unset to run without it.
      # - TWELVE_DATA_API_KEY=your_api_key_here
      - RATELIMIT_STORAGE_URI=memory://  # Use redis://redis:6379/0 if WEB_CONCURRENCY > 1
      - WEB_CONCURRENCY=1
    restart: unless-stopped

  shelly-dev:
    profiles: ["dev"]
    build: .
    container_name: shelly-dev
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
    environment:
      # Optional: enables Twelve Data price lookups. Leave unset to run without it.
      # - TWELVE_DATA_API_KEY=your_api_key_here
      - RATELIMIT_STORAGE_URI=memory://  # Use redis://redis:6379/0 if WEB_CONCURRENCY > 1
      - WEB_CONCURRENCY=1
    restart: unless-stopped
